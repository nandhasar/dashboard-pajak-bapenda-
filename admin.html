<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Edit Data Pajak BAPENDA Lombok Tengah</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
        }

        .header {
            background: linear-gradient(135deg, #e53e3e 0%, #c53030 100%);
            color: white;
            padding: 15px 20px;
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 { font-size: 1.1rem; display: flex; align-items: center; gap: 10px; }

        .btn-back {
            background: rgba(255,255,255,0.2);
            color: white;
            padding: 8px 15px;
            border: none;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
        }

        .btn-back:hover { background: rgba(255,255,255,0.3); color: white; }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        .alert {
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .alert-success { background: #d4edda; border: 1px solid #28a745; color: #155724; }
        .alert-danger { background: #f8d7da; border: 1px solid #dc3545; color: #721c24; }
        .alert-info { background: #d1ecf1; border: 1px solid #17a2b8; color: #0c5460; }

        .card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            margin-bottom: 20px;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #e2e8f0;
        }

        .card-title { font-size: 1.1rem; font-weight: 600; }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-primary { background: #3182ce; color: white; }
        .btn-primary:hover { background: #2c5282; }
        .btn-success { background: #48bb78; color: white; }
        .btn-success:hover { background: #38a169; }

        .form-group { margin-bottom: 15px; }

        .form-label {
            font-weight: 600;
            margin-bottom: 8px;
            display: block;
            color: #2d3748;
        }

        .form-control {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-family: 'Poppins', sans-serif;
            font-size: 0.95rem;
        }

        .form-control:focus {
            outline: none;
            border-color: #3182ce;
            box-shadow: 0 0 0 3px rgba(49,130,206,0.2);
        }

        .input-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .input-group .currency {
            font-weight: 600;
            color: #48bb78;
            min-width: 30px;
        }

        .input-info {
            font-size: 0.8rem;
            color: #718096;
            margin-top: 5px;
        }

        .input-result {
            background: #e6fffa;
            border: 2px solid #319795;
            padding: 12px 15px;
            border-radius: 10px;
            text-align: right;
            font-weight: 700;
            font-size: 1.1rem;
            color: #234e52;
        }

        .sheet-tabs { display: flex; gap: 10px; margin-bottom: 20px; }

        .sheet-tab {
            padding: 10px 25px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }

        .sheet-tab.active { background: #3182ce; color: white; }
        .sheet-tab:not(.active) { background: #e2e8f0; color: #4a5568; }

        .table-responsive { overflow-x: auto; }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.8rem;
        }

        th {
            background: #1a202c;
            color: white;
            padding: 10px 5px;
            text-align: center;
        }

        th:first-child, td:first-child { text-align: center; width: 30px; }
        th:nth-child(2), td:nth-child(2) { text-align: left; min-width: 180px; }

        td { padding: 8px 5px; border-bottom: 1px solid #e2e8f0; text-align: center; }
        tr:hover { background: #f7fafc; }

        .td-left { text-align: left; font-weight: 500; }
        .td-number { font-family: 'Courier New', monospace; }
        .td-changed { background: #c6f6d5 !important; color: #276749; font-weight: 700; }

        .preview-box {
            background: linear-gradient(135deg, #48bb78 0%, #38a169 100%);
            color: white;
            border-radius: 10px;
            padding: 15px;
            margin-top: 15px;
        }

        .preview-box h4 { margin-bottom: 15px; }
        .preview-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255,255,255,0.2);
        }
        .preview-row:last-child { border-bottom: none; }
        .preview-label { opacity: 0.9; }
        .preview-value { font-weight: 700; }

        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 10px;
            color: white;
            font-weight: 500;
            z-index: 1000;
            animation: slideIn 0.3s ease;
            display: none;
        }

        .toast.show { display: flex; align-items: center; gap: 10px; }
        .toast.success { background: #48bb78; }
        .toast.error { background: #e53e3e; }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(100px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 999;
        }

        .loading.show { display: flex; }

        .loading-box {
            background: white;
            padding: 30px 50px;
            border-radius: 15px;
            text-align: center;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #e2e8f0;
            border-top: 4px solid #3182ce;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* Debug */
        .debug-panel {
            background: #1a202c;
            color: #68d391;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-family: 'Courier New', monospace;
            font-size: 0.75rem;
            max-height: 400px;
            overflow-y: auto;
        }

        .debug-panel .debug-warn { color: #f6e05e; }
        .debug-panel .debug-error { color: #fc8181; }
        .debug-panel .debug-ok { color: #68d391; }

        @media (max-width: 768px) {
            .header-content { flex-direction: column; gap: 10px; }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-content">
            <h1>⚙️ Admin Panel - Edit Data Pajak BAPENDA Lombok Tengah</h1>
            <a href="dashboard.html" class="btn-back">← Dashboard</a>
        </div>
    </header>

    <div class="container">
        <!-- Status -->
        <div id="statusAlert" class="alert alert-info">🔄 Memuat data...</div>

        <!-- DEBUG PANEL -->
        <div id="debugPanel" class="debug-panel" style="display: none;">
            <div id="debugContent"></div>
        </div>

        <!-- Form Input -->
        <div class="card">
            <div class="card-header">
                <h2 class="card-title">📝 Input Realisasi Pajak</h2>
            </div>

            <!-- Sheet Selection -->
            <div class="form-group">
                <label class="form-label">📋 Pilih Sheet</label>
                <div class="sheet-tabs">
                    <button class="sheet-tab active" id="btnSheet2026" onclick="selectSheet(0, 'Data_Pajak_2026')">📅 2026</button>
                    <button class="sheet-tab" id="btnSheet2025" onclick="selectSheet(1, 'Data_Pajak_2025')">📅 2025</button>
                </div>
            </div>

            <!-- Pajak Selection -->
            <div class="form-group">
                <label class="form-label">🏷️ Jenis Pajak</label>
                <select id="pajakSelect" class="form-control">
                    <option value="">-- Pilih Jenis Pajak --</option>
                </select>
            </div>

            <!-- Bulan Selection -->
            <div class="form-group">
                <label class="form-label">📅 Bulan yang Diinput</label>
                <select id="bulanSelect" class="form-control">
                    <option value="">-- Pilih Bulan --</option>
                    <option value="1">Januari</option>
                    <option value="2">Februari</option>
                    <option value="3">Maret</option>
                    <option value="4">April</option>
                    <option value="5">Mei</option>
                    <option value="6">Juni</option>
                    <option value="7">Juli</option>
                    <option value="8">Agustus</option>
                    <option value="9">September</option>
                    <option value="10">Oktober</option>
                    <option value="11">November</option>
                    <option value="12">Desember</option>
                </select>
            </div>

            <!-- Input 1: s/d Bulan Lalu -->
            <div class="form-group">
                <label class="form-label">💰 Total s/d Bulan Lalu (<span id="labelBulanLalu">-</span>)</label>
                <div class="input-group">
                    <span class="currency">Rp</span>
                    <input type="text" id="realisasiLalu" class="form-control" 
                           style="text-align: right;" 
                           placeholder="Contoh: 99336000">
                </div>
                <div class="input-info">📌 Masukkan ANGKA saja</div>
            </div>

            <!-- Input 2: Nilai Bulan Ini -->
            <div class="form-group">
                <label class="form-label">💰 Nilai <span id="labelBulanIni">-</span> SAJA</label>
                <div class="input-group">
                    <span class="currency">Rp</span>
                    <input type="text" id="nilaiBulanIni" class="form-control" 
                           style="text-align: right;" 
                           placeholder="Contoh: 81054500">
                </div>
                <div class="input-info">📌 Masukkan ANGKA saja</div>
            </div>

            <!-- Auto Calculate: s/d Bulan Ini -->
            <div class="form-group">
                <label class="form-label">📐 Total s/d Bulan Ini (AUTO)</label>
                <div class="input-result" id="totalSampai">Rp 0</div>
            </div>

            <!-- Preview Box -->
            <div id="previewBox" class="preview-box" style="display: none;">
                <h4>📊 Preview:</h4>
                <div id="previewRows"></div>
            </div>

            <!-- Save Button -->
            <button id="btnSave" class="btn btn-success" style="width: 100%; padding: 15px; font-size: 1rem; margin-top: 15px;" onclick="saveData()">
                💾 SIMPAN DATA
            </button>
        </div>

        <!-- Table -->
        <div class="card">
            <div class="card-header">
                <h2 class="card-title">📊 Data Pajak - <span id="currentSheetName">Loading...</span></h2>
                <button class="btn btn-primary" onclick="loadData()">🔄 Refresh</button>
            </div>

            <div class="table-responsive">
                <table>
                    <thead id="tableHead">
                        <tr><th>Loading...</th></tr>
                    </thead>
                    <tbody id="tableBody">
                        <tr><td colspan="16" style="text-align: center; padding: 40px; color: #999;">Memuat data...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast">
        <span id="toastIcon">✅</span>
        <span id="toastMessage">Berhasil!</span>
    </div>

    <!-- Loading -->
    <div class="loading" id="loading">
        <div class="loading-box">
            <div class="spinner"></div>
            <p id="loadingText">Memproses...</p>
        </div>
    </div>

    <script>
        // ============================================================
        // CONFIG
        // ============================================================
        
        const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbyHLEPqaP0BKWuiLoYiTBvtYlq2HWWUJz0yNpAKTNucP1BiwBFsDZa2-qbcgz4u253u/exec';

        const BULAN_NAMES = ['', 'Januari', 'Februari', 'Maret', 'April', 'Mei', 'Juni', 
                             'Juli', 'Agustus', 'September', 'Oktober', 'November', 'Desember'];

        // ============================================================
        // STATE
        // ============================================================
        
        let currentSheetIndex = 0;
        let currentSheetName = 'Data_Pajak_2026';
        let rawData = [];
        let pajakList = [];
        let changeToSave = null;

        // ============================================================
        // INIT - Event Listeners
        // ============================================================
        
        document.addEventListener('DOMContentLoaded', function() {
            // Event listeners langsung ke elements
            document.getElementById('pajakSelect').addEventListener('change', function() {
                processForm();
            });
            
            document.getElementById('bulanSelect').addEventListener('change', function() {
                processForm();
            });
            
            document.getElementById('realisasiLalu').addEventListener('input', function() {
                processForm();
            });
            
            document.getElementById('nilaiBulanIni').addEventListener('input', function() {
                processForm();
            });
            
            loadData();
        });

        // ============================================================
        // LOAD DATA
        // ============================================================
        
        async function loadData() {
            showLoading(true, 'Memuat data...');
            
            try {
                const url = WEB_APP_URL + '?action=getData&sheetIndex=' + currentSheetIndex;
                const response = await fetch(url);
                const result = await response.json();
                
                if (result.status !== 'success') {
                    throw new Error(result.message || 'Gagal mengambil data');
                }
                
                const data = result.data;
                currentSheetName = result.sheetName;
                
                rawData = [];
                pajakList = [];
                
                // Build dropdown
                const select = document.getElementById('pajakSelect');
                select.innerHTML = '<option value="">-- Pilih Jenis Pajak --</option>';
                
                for (let i = 1; i < data.length; i++) {
                    if (data[i] && data[i][0]) {
                        rawData.push(data[i]);
                        pajakList.push(data[i][0]);
                        
                        const option = document.createElement('option');
                        option.value = String(pajakList.length - 1);
                        option.textContent = data[i][0];
                        select.appendChild(option);
                    }
                }
                
                renderTable();
                
                document.getElementById('statusAlert').className = 'alert alert-success';
                document.getElementById('statusAlert').innerHTML = 
                    '✅ <strong>Connected!</strong> Sheet: <strong>' + currentSheetName + '</strong> | ' + rawData.length + ' pajak';
                
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('statusAlert').className = 'alert alert-danger';
                document.getElementById('statusAlert').innerHTML = '❌ <strong>Error:</strong> ' + error.message;
            }
            
            showLoading(false);
        }

        // ============================================================
        // SELECT SHEET
        // ============================================================
        
        function selectSheet(index, name) {
            currentSheetIndex = index;
            currentSheetName = name;
            
            document.getElementById('btnSheet2026').classList.remove('active');
            document.getElementById('btnSheet2025').classList.remove('active');
            
            if (index === 0) {
                document.getElementById('btnSheet2026').classList.add('active');
            } else {
                document.getElementById('btnSheet2025').classList.add('active');
            }
            
            resetForm();
            loadData();
        }

        function resetForm() {
            document.getElementById('pajakSelect').value = '';
            document.getElementById('bulanSelect').value = '';
            document.getElementById('realisasiLalu').value = '';
            document.getElementById('nilaiBulanIni').value = '';
            document.getElementById('totalSampai').textContent = 'Rp 0';
            document.getElementById('previewBox').style.display = 'none';
            document.getElementById('labelBulanLalu').textContent = '-';
            document.getElementById('labelBulanIni').textContent = '-';
            changeToSave = null;
            renderTable();
        }

        // ============================================================
        // FORMAT & PARSE
        // ============================================================
        
        function formatNumber(num) {
            if (!num && num !== 0) return '0';
            return parseFloat(num).toLocaleString('id-ID');
        }

        function parseNumber(str) {
            if (!str) return 0;
            var cleaned = str.toString().replace(/\./g, '').replace(/,/g, '');
            return parseInt(cleaned) || 0;
        }

        // ============================================================
        // PROCESS FORM - DIPANGGIL DARI EVENT LISTENER
        // ============================================================
        
        function processForm() {
            var pajakSelect = document.getElementById('pajakSelect');
            var bulanSelect = document.getElementById('bulanSelect');
            
            var pajakIdx = pajakSelect.selectedIndex - 1;
            var bulanIdx = parseInt(bulanSelect.value) || 0;
            var valLalu = parseNumber(document.getElementById('realisasiLalu').value);
            var valBulanIni = parseNumber(document.getElementById('nilaiBulanIni').value);
            
            var prevBulan = bulanIdx > 1 ? BULAN_NAMES[bulanIdx - 1] : '-';
            var currBulan = bulanIdx > 0 ? BULAN_NAMES[bulanIdx] : '-';
            document.getElementById('labelBulanLalu').textContent = prevBulan;
            document.getElementById('labelBulanIni').textContent = currBulan;
            
            var totalSampai = valLalu + valBulanIni;
            document.getElementById('totalSampai').textContent = 'Rp ' + formatNumber(totalSampai);
            
            // Debug
            document.getElementById('debugPanel').style.display = 'block';
            document.getElementById('debugContent').innerHTML = 
                'pajakIdx: ' + pajakIdx + '<br>' +
                'bulanIdx: ' + bulanIdx + '<br>' +
                'valBulanIni: ' + valBulanIni + '<br>' +
                'pajakSelect.value: ' + pajakSelect.value + '<br>' +
                'pajakSelect.selectedIndex: ' + pajakSelect.selectedIndex;
            
            if (pajakIdx >= 0 && bulanIdx > 0 && valBulanIni > 0) {
                var colBulan = bulanIdx + 1;
                var rowNum = pajakIdx + 2;
                
                changeToSave = {
                    rowNum: rowNum,
                    col: colBulan,
                    newVal: valBulanIni,
                    bulanName: BULAN_NAMES[bulanIdx],
                    pajakIdx: pajakIdx,
                    pajakName: pajakList[pajakIdx]
                };
                
                document.getElementById('previewBox').style.display = 'block';
                document.getElementById('previewRows').innerHTML = 
                    '<div class="preview-row"><span class="preview-label">Pajak:</span><span class="preview-value">' + pajakList[pajakIdx] + '</span></div>' +
                    '<div class="preview-row"><span class="preview-label">Bulan:</span><span class="preview-value">' + BULAN_NAMES[bulanIdx] + '</span></div>' +
                    '<div class="preview-row"><span class="preview-label">Nilai:</span><span class="preview-value">Rp ' + formatNumber(valBulanIni) + '</span></div>';
                
                renderTable(pajakIdx, colBulan);
                
            } else {
                changeToSave = null;
                document.getElementById('previewBox').style.display = 'none';
                renderTable();
            }
        }

        // ============================================================
        // RENDER TABLE
        // ============================================================
        
        function renderTable(highlightRow, highlightCol) {
            highlightRow = highlightRow || -1;
            highlightCol = highlightCol || -1;
            
            var thead = document.getElementById('tableHead');
            var tbody = document.getElementById('tableBody');
            
            document.getElementById('currentSheetName').textContent = currentSheetName;
            
            if (rawData.length === 0) {
                thead.innerHTML = '<tr><th>No</th><th>Data</th></tr>';
                tbody.innerHTML = '<tr><td colspan="2">Tidak ada data</td></tr>';
                return;
            }
            
            var headerHtml = '<tr><th>#</th><th>Jenis Pajak</th>';
            var months = ['Target', 'Jan', 'Feb', 'Mar', 'Apr', 'Mei', 'Jun', 'Jul', 'Agu', 'Sep', 'Okt', 'Nov', 'Des'];
            for (var m = 0; m < months.length; m++) {
                headerHtml += '<th>' + months[m] + '</th>';
            }
            headerHtml += '</tr>';
            thead.innerHTML = headerHtml;
            
            var bodyHtml = '';
            
            for (var i = 0; i < rawData.length; i++) {
                var row = rawData[i];
                var isHighlightRow = (i === highlightRow);
                
                bodyHtml += '<tr' + (isHighlightRow ? ' class="table-warning"' : '') + '>';
                bodyHtml += '<td><strong>' + (i + 1) + '</strong></td>';
                bodyHtml += '<td class="td-left">' + row[0] + '</td>';
                
                for (var col = 1; col <= 13; col++) {
                    var value = parseFloat(row[col]) || 0;
                    var tdClass = 'td-number';
                    
                    if (isHighlightRow && col === highlightCol && changeToSave) {
                        value = changeToSave.newVal;
                        tdClass = 'td-number td-changed';
                    }
                    
                    bodyHtml += '<td class="' + tdClass + '">' + formatNumber(value) + '</td>';
                }
                
                bodyHtml += '</tr>';
            }
            
            tbody.innerHTML = bodyHtml;
        }

        // ============================================================
        // SAVE DATA
        // ============================================================
        
        async function saveData() {
            var pajakSelect = document.getElementById('pajakSelect');
            var pajakIdx = pajakSelect.selectedIndex - 1;
            var bulanIdx = parseInt(document.getElementById('bulanSelect').value) || 0;
            var valBulanIni = parseNumber(document.getElementById('nilaiBulanIni').value);
            
            if (pajakIdx < 0) {
                showToast('⚠️ Pilih Jenis Pajak! (' + pajakIdx + ')', 'error');
                return;
            }
            if (bulanIdx <= 0) {
                showToast('⚠️ Pilih Bulan!', 'error');
                return;
            }
            if (valBulanIni <= 0) {
                showToast('⚠️ Masukkan Nilai!', 'error');
                return;
            }
            if (!changeToSave) {
                showToast('⚠️ Error! Refresh halaman.', 'error');
                return;
            }
            
            var btn = document.getElementById('btnSave');
            btn.disabled = true;
            btn.textContent = '⏳ Menyimpan...';
            
            showLoading(true, 'Menyimpan data...');
            
            try {
                await fetch(WEB_APP_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        sheetIndex: currentSheetIndex,
                        row: changeToSave.rowNum,
                        column: changeToSave.col,
                        value: changeToSave.newVal
                    })
                });
                
                rawData[changeToSave.pajakIdx][changeToSave.col - 1] = changeToSave.newVal;
                
                showToast('✅ Data ' + changeToSave.bulanName + ' berhasil disimpan!', 'success');
                resetForm();
                
            } catch (error) {
                showToast('❌ Gagal: ' + error.message, 'error');
            }
            
            showLoading(false);
            btn.disabled = false;
            btn.textContent = '💾 SIMPAN DATA';
        }

        // ============================================================
        // TOAST & LOADING
        // ============================================================
        
        function showToast(message, type) {
            type = type || 'success';
            var toast = document.getElementById('toast');
            document.getElementById('toastIcon').textContent = (type === 'success') ? '✅' : '❌';
            document.getElementById('toastMessage').textContent = message;
            toast.className = 'toast ' + type + ' show';
            setTimeout(function() { toast.classList.remove('show'); }, 4000);
        }

        function showLoading(show, text) {
            text = text || 'Memproses...';
            var loading = document.getElementById('loading');
            if (show) {
                loading.classList.add('show');
            } else {
                loading.classList.remove('show');
            }
            document.getElementById('loadingText').textContent = text;
        }
    </script>
</body>
</html>
