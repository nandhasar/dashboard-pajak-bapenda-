    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>

    <script>
        // ============================================================
        // STATUS
        // ============================================================
        
        let currentSheetIndex = 0;
        let currentSheetName = 'Data_Pajak_2026';
        let rawData = [];
        let headers = [];
        let changes = {};

        // ============================================================
        // FORMAT
        // ============================================================
        
        function formatNumber(num) {
            if (!num && num !== 0) return '0';
            return parseFloat(num).toLocaleString('id-ID');
        }

        function parseNumber(str) {
            if (!str) return 0;
            const cleaned = str.toString().replace(/[^\d.-]/g, '');
            return parseFloat(cleaned) || 0;
        }

        // ============================================================
        // LOAD DATA - Pakai Google.script.run (RESMI GOOGLE)
        // ============================================================
        
        function loadData() {
            showLoading(true, 'Memuat data dari server...');
            $('#statusAlert').removeClass('alert-success alert-danger').addClass('alert-info').html('🔄 Memuat data...');
            
            // Pakai Google.script.run - cara resmi Google
            google.script.run
                .withSuccessHandler(function(result) {
                    showLoading(false);
                    
                    if (result.status === 'success') {
                        currentSheetName = result.sheetName;
                        rawData = [];
                        
                        // Skip header row (index 0), mulai dari index 1
                        for (let i = 1; i < result.data.length; i++) {
                            if (result.data[i] && result.data[i][0]) {
                                rawData.push(result.data[i]);
                            }
                        }
                        
                        renderTable();
                        showToast(`✅ Data berhasil dimuat! (${rawData.length} pajak)`, 'success');
                        
                        $('#statusAlert').removeClass('alert-info alert-danger').addClass('alert-success')
                            .html(`✅ <strong>Connected!</strong> Sheet: <strong>${currentSheetName}</strong> | ${rawData.length} data`);
                        
                    } else {
                        throw new Error(result.message || 'Gagal mengambil data');
                    }
                })
                .withFailureHandler(function(error) {
                    showLoading(false);
                    console.error('Error:', error);
                    showToast('Error: ' + error, 'error');
                    $('#statusAlert').removeClass('alert-info alert-success').addClass('alert-danger')
                        .html(`❌ <strong>Error:</strong> ${error}`);
                })
                .getData(currentSheetIndex);
        }

        // ============================================================
        // RENDER TABLE
        // ============================================================
        
        function renderTable() {
            const thead = document.getElementById('tableHead');
            const tbody = document.getElementById('tableBody');
            const sheetNameEl = document.getElementById('currentSheetName');
            
            sheetNameEl.textContent = currentSheetName;
            
            if (rawData.length === 0) {
                thead.innerHTML = '<tr><th>No</th><th>Data</th></tr>';
                tbody.innerHTML = '<tr><td colspan="2" style="text-align: center; padding: 30px; color: #999;">Tidak ada data</td></tr>';
                return;
            }
            
            // Render header
            let headerHtml = '<tr><th>#</th><th>Jenis Pajak</th>';
            const displayHeaders = ['Target', 'Januari', 'Februari', 'Maret', 'April', 'Mei', 'Juni', 'Juli', 'Agustus', 'September', 'Oktober', 'November', 'Desember'];
            displayHeaders.forEach(h => {
                headerHtml += `<th>${h}</th>`;
            });
            headerHtml += '<th>Aksi</th></tr>';
            thead.innerHTML = headerHtml;
            
            // Render body
            let bodyHtml = '';
            
            rawData.forEach((row, index) => {
                const rowNum = index + 2; // Row 2 karena header di row 1
                
                bodyHtml += `<tr>`;
                bodyHtml += `<td><strong>${index + 1}</strong></td>`;
                bodyHtml += `<td style="text-align: left; font-weight: 500;">${row[0] || ''}</td>`;
                
                // Kolom 1=Target, Kolom 2-13=12 Bulan
                for (let col = 1; col <= 13; col++) {
                    const colNum = col + 1;
                    const value = row[col] || 0;
                    
                    bodyHtml += `<td>
                        <input type="text" 
                               class="edit-input" 
                               data-row="${rowNum}" 
                               data-col="${colNum}" 
                               value="${formatNumber(value)}"
                               oninput="onInputChange(this)">
                    </td>`;
                }
                
                bodyHtml += `<td>
                    <button class="btn-save" onclick="saveRow(${index})">
                        💾 Save
                    </button>
                </td>`;
                bodyHtml += `</tr>`;
            });
            
            tbody.innerHTML = bodyHtml;
            changes = {};
        }

        // ============================================================
        // INPUT CHANGE
        // ============================================================
        
        function onInputChange(input) {
            const row = input.dataset.row;
            const col = input.dataset.col;
            const key = `${row}-${col}`;
            const newValue = parseNumber(input.value);
            
            const rowIndex = parseInt(row) - 2;
            const colIndex = parseInt(col) - 1;
            
            const originalValue = rawData[rowIndex] ? (parseFloat(rawData[rowIndex][colIndex]) || 0) : 0;
            
            if (Math.abs(newValue - originalValue) > 0.01) {
                changes[key] = newValue;
                input.classList.add('changed');
            } else {
                delete changes[key];
                input.classList.remove('changed');
            }
        }

        // ============================================================
        // SAVE ROW - Pakai Google.script.run (RESMI GOOGLE)
        // ============================================================
        
        function saveRow(rowIndex) {
            const rowNum = rowIndex + 2;
            
            // Collect changes
            const rowChanges = {};
            
            for (let col = 1; col <= 13; col++) {
                const key = `${rowNum}-${col}`;
                const input = document.querySelector(`input[data-row="${rowNum}"][data-col="${col}"]`);
                
                if (input && input.classList.contains('changed')) {
                    rowChanges[col] = parseNumber(input.value);
                }
            }
            
            if (Object.keys(rowChanges).length === 0) {
                showToast('⚠️ Tidak ada perubahan!', 'error');
                return;
            }
            
            // Button state
            const btn = event.target;
            btn.disabled = true;
            btn.textContent = '⏳ Saving...';
            
            showLoading(true, `Menyimpan ${Object.keys(rowChanges).length} data...`);
            
            // Save cell by cell - async tapi pakai callback
            let savedCount = 0;
            const totalCells = Object.keys(rowChanges).length;
            
            for (const [colStr, value] of Object.entries(rowChanges)) {
                const col = parseInt(colStr);
                
                // Pakai Google.script.run
                google.script.run
                    .withSuccessHandler(function(result) {
                        savedCount++;
                        console.log(`✅ Saved: Col ${col} = ${value}`, result);
                        
                        if (savedCount === totalCells) {
                            // Semua selesai
                            saveComplete(rowIndex, rowChanges);
                        }
                    })
                    .withFailureHandler(function(error) {
                        console.error('❌ Error saving:', error);
                        savedCount++;
                        showToast('❌ Error: ' + error, 'error');
                        showLoading(false);
                        btn.disabled = false;
                        btn.textContent = '💾 Save';
                    })
                    .updateCell(currentSheetIndex, rowNum, col, value);
            }
        }

        // ============================================================
        // SAVE COMPLETE
        // ============================================================
        
        function saveComplete(rowIndex, rowChanges) {
            // Update local data
            for (const [colStr, value] of Object.entries(rowChanges)) {
                const col = parseInt(colStr);
                const colIndex = col - 1;
                
                if (rawData[rowIndex]) {
                    rawData[rowIndex][colIndex] = value;
                }
            }
            
            // Clear changes
            changes = {};
            
            // Re-render
            renderTable();
            
            showLoading(false);
            showToast(`✅ ${Object.keys(rowChanges).length} data berhasil disimpan!`, 'success');
        }

        // ============================================================
        // SWITCH SHEET
        // ============================================================
        
        function switchSheet(index, name) {
            currentSheetIndex = index;
            currentSheetName = name;
            
            document.querySelectorAll('.sheet-tab').forEach(tab => {
                tab.classList.remove('active');
            });
            event.target.classList.add('active');
            
            loadData();
        }

        // ============================================================
        // TOAST
        // ============================================================
        
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            const toastIcon = document.getElementById('toastIcon');
            const toastMessage = document.getElementById('toastMessage');
            
            toastIcon.textContent = type === 'success' ? '✅' : '❌';
            toastMessage.textContent = message;
            toast.className = `toast ${type} show`;
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 4000);
        }

        // ============================================================
        // LOADING
        // ============================================================
        
        function showLoading(show, text = 'Memproses...') {
            document.getElementById('loading').classList.toggle('show', show);
            document.getElementById('loadingText').textContent = text;
        }

        // ============================================================
        // INIT
        // ============================================================
        
        $(document).ready(function() {
            loadData();
        });
    </script>
</body>
