<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Edit Data Pajak BAPENDA Lombok Tengah</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
        }

        .header {
            background: linear-gradient(135deg, #e53e3e 0%, #c53030 100%);
            color: white;
            padding: 15px 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn-back {
            background: rgba(255,255,255,0.2);
            color: white;
            padding: 8px 15px;
            border: none;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
        }

        .btn-back:hover { background: rgba(255,255,255,0.3); color: white; }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        .alert {
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .alert-success { background: #d4edda; border: 1px solid #28a745; color: #155724; }
        .alert-danger { background: #f8d7da; border: 1px solid #dc3545; color: #721c24; }
        .alert-info { background: #d1ecf1; border: 1px solid #17a2b8; color: #0c5460; }

        .card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #e2e8f0;
            flex-wrap: wrap;
            gap: 15px;
        }

        .card-title { font-size: 1.1rem; font-weight: 600; }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-primary { background: #3182ce; color: white; }
        .btn-primary:hover { background: #2c5282; }
        .btn-success { background: #48bb78; color: white; }
        .btn-success:hover { background: #38a169; }

        .sheet-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .sheet-tab {
            padding: 10px 25px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }

        .sheet-tab.active { background: #3182ce; color: white; }
        .sheet-tab:not(.active) { background: #e2e8f0; color: #4a5568; }

        .table-responsive { overflow-x: auto; }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
        }

        th {
            background: #1a202c;
            color: white;
            padding: 12px 8px;
            text-align: center;
            white-space: nowrap;
        }

        th:first-child, td:first-child { text-align: center; width: 40px; }
        th:nth-child(2), td:nth-child(2) { text-align: left; min-width: 200px; }

        td {
            padding: 8px 5px;
            border-bottom: 1px solid #e2e8f0;
            text-align: center;
        }

        tr:hover { background: #f7fafc; }

        .edit-input {
            width: 100%;
            max-width: 95px;
            padding: 6px 8px;
            border: 1px solid #e2e8f0;
            border-radius: 5px;
            text-align: right;
            font-family: 'Courier New', monospace;
            font-size: 0.8rem;
        }

        .edit-input:focus {
            outline: none;
            border-color: #3182ce;
            box-shadow: 0 0 0 2px rgba(49,130,206,0.2);
        }

        .edit-input.changed {
            background: #fef3c7;
            border-color: #f59e0b;
            font-weight: 600;
        }

        .btn-save {
            background: #48bb78;
            color: white;
            border: none;
            padding: 6px 15px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .btn-save:hover { background: #38a169; }
        .btn-save:disabled { background: #a0aec0; cursor: not-allowed; }
        .btn-save.saving { background: #d69e2e; }

        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 10px;
            color: white;
            font-weight: 500;
            z-index: 1000;
            animation: slideIn 0.3s ease;
            display: none;
        }

        .toast.show { display: flex; align-items: center; gap: 10px; }
        .toast.success { background: #48bb78; }
        .toast.error { background: #e53e3e; }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(100px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 999;
        }

        .loading.show { display: flex; }

        .loading-box {
            background: white;
            padding: 30px 50px;
            border-radius: 15px;
            text-align: center;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #e2e8f0;
            border-top: 4px solid #3182ce;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .debug-log {
            background: #1a1a2e;
            color: #10b981;
            padding: 10px;
            border-radius: 8px;
            margin-top: 20px;
            font-family: monospace;
            font-size: 0.8rem;
            max-height: 150px;
            overflow-y: auto;
            display: none;
        }

        .debug-log.show { display: block; }

        @media (max-width: 768px) {
            .header-content { flex-direction: column; gap: 10px; }
            .edit-input { width: 70px; font-size: 0.7rem; }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-content">
            <h1>⚙️ Admin Panel - Edit Data Pajak BAPENDA Lombok Tengah</h1>
            <a href="dashboard.html" class="btn-back">← Dashboard</a>
        </div>
    </header>

    <div class="container">
        <!-- Status Alert -->
        <div id="statusAlert" class="alert alert-info">
            🔄 Inisialisasi...
        </div>

        <!-- Main Card -->
        <div class="card">
            <div class="card-header">
                <h2 class="card-title">📝 Edit Data Pajak - <span id="currentSheetName">Data_Pajak_2026</span></h2>
                <div>
                    <button class="btn btn-primary" onclick="loadData()">
                        🔄 Load Ulang
                    </button>
                </div>
            </div>

            <!-- Sheet Tabs -->
            <div class="sheet-tabs">
                <button class="sheet-tab active" onclick="switchSheet(0, 'Data_Pajak_2026')">
                    📅 Data_Pajak_2026
                </button>
                <button class="sheet-tab" onclick="switchSheet(1, 'Data_Pajak_2025')">
                    📅 Data_Pajak_2025
                </button>
            </div>

            <!-- Table -->
            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th>No</th>
                            <th>Jenis Pajak</th>
                            <th>Target</th>
                            <th>Jan</th>
                            <th>Feb</th>
                            <th>Mar</th>
                            <th>Apr</th>
                            <th>Mei</th>
                            <th>Jun</th>
                            <th>Jul</th>
                            <th>Agu</th>
                            <th>Sep</th>
                            <th>Okt</th>
                            <th>Nov</th>
                            <th>Des</th>
                            <th>Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <tr>
                            <td colspan="16" style="text-align: center; padding: 40px; color: #999;">
                                Klik "Load Ulang" untuk memuat data
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <!-- Debug Log -->
            <div class="debug-log" id="debugLog"></div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast">
        <span id="toastIcon">✅</span>
        <span id="toastMessage">Berhasil!</span>
    </div>

    <!-- Loading -->
    <div class="loading" id="loading">
        <div class="loading-box">
            <div class="spinner"></div>
            <p id="loadingText">Memproses...</p>
        </div>
    </div>

    <script>
        // ============================================================
        // KONFIGURASI
        // ============================================================
        
        // ✅ URL Web App Anda
        const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbxScrI-w2hSCw0Rq96YVP_rvxgeaWRv3O5Vhrd-MVQkYnKqmAnC3t_FTbWexlGxF4kM/exec';
        
        // ✅ Spreadsheet ID
        const SHEET_ID = '1BE7gPYSSlCnaIZ4Q7RvGx_L_2v46fQjkEnK3EC3VQz4';

        // ============================================================
        // STATUS
        // ============================================================
        
        let currentSheetIndex = 0;
        let currentSheetName = 'Data_Pajak_2026';
        let rawData = [];
        let changes = {};
        let debugMode = true; // Set false untuk production

        // ============================================================
        // DEBUG LOG
        // ============================================================
        
        function debug(message) {
            if (!debugMode) return;
            const log = document.getElementById('debugLog');
            const time = new Date().toLocaleTimeString();
            log.innerHTML += `<div>[${time}] ${message}</div>`;
            log.classList.add('show');
            log.scrollTop = log.scrollHeight;
        }

        // ============================================================
        // FORMAT
        // ============================================================
        
        function formatNumber(num) {
            if (!num && num !== 0) return '0';
            return parseFloat(num).toLocaleString('id-ID');
        }

        function parseNumber(str) {
            if (!str) return 0;
            const cleaned = str.toString().replace(/[^\d.-]/g, '');
            return parseFloat(cleaned) || 0;
        }

        // ============================================================
        // LOAD DATA DARI CSV
        // ============================================================
        
        async function loadData() {
            showLoading(true, 'Memuat data...');
            debug(`📥 Loading sheet index: ${currentSheetIndex}`);
            
            try {
                // GID untuk export CSV
                // GID 0 = sheet pertama
                // Untuk sheet lain, kita perlu GID yang benar
                // Karena kita tidak tahu GID sheet kedua, coba dengan GID = sheetIndex
                const gid = currentSheetIndex;
                const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${gid}`;
                
                debug(`📡 Fetching: ${url}`);
                
                const response = await fetch(url);
                
                if (!response.ok) {
                    throw new Error(`HTTP Error: ${response.status}`);
                }
                
                const csv = await response.text();
                debug(`📄 CSV received: ${csv.length} characters`);
                
                rawData = parseCSV(csv);
                debug(`📊 Parsed: ${rawData.length} rows`);
                
                if (rawData.length === 0) {
                    throw new Error('Tidak ada data ditemukan');
                }
                
                renderTable();
                showToast(`✅ Data berhasil dimuat! (${rawData.length} baris)`, 'success');
                
            } catch (error) {
                console.error('Error:', error);
                debug(`❌ Error: ${error.message}`);
                showToast('Error: ' + error.message, 'error');
            }
            
            showLoading(false);
        }

        function parseCSV(csv) {
            const lines = csv.split('\n');
            const result = [];
            
            for (let i = 1; i < lines.length; i++) {
                if (!lines[i].trim()) continue;
                
                // Parse CSV
                const values = [];
                let current = '';
                let inQuotes = false;
                
                for (let char of lines[i]) {
                    if (char === '"') {
                        inQuotes = !inQuotes;
                    } else if (char === ',' && !inQuotes) {
                        values.push(current.trim());
                        current = '';
                    } else {
                        current += char;
                    }
                }
                values.push(current.trim());
                
                if (!values[0] || values[0].trim() === '') continue;
                
                const row = {
                    name: values[0].trim(),
                    target: parseFloat(values[1]) || 0,
                    bulan: []
                };
                
                for (let j = 2; j <= 13; j++) {
                    row.bulan.push(parseFloat(values[j]) || 0);
                }
                
                result.push(row);
            }
            
            return result;
        }

        // ============================================================
        // RENDER TABLE
        // ============================================================
        
        function renderTable() {
            const tbody = document.getElementById('tableBody');
            
            if (rawData.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="16" style="text-align: center; padding: 30px; color: #999;">
                            Tidak ada data
                        </td>
                    </tr>
                `;
                return;
            }
            
            let html = '';
            
            rawData.forEach((item, index) => {
                const rowNum = index + 2; // Row 2 karena header di row 1
                
                html += `<tr data-row="${rowNum}">`;
                html += `<td>${index + 1}</td>`;
                html += `<td style="text-align: left; font-weight: 500;">${item.name}</td>`;
                
                // Target (Kolom B = 2)
                html += `<td>
                    <input type="text" 
                           class="edit-input" 
                           data-row="${rowNum}" 
                           data-col="2" 
                           value="${formatNumber(item.target)}"
                           oninput="onInputChange(this)">
                </td>`;
                
                // Bulan (Kolom C-N = 3-14)
                for (let i = 0; i < 12; i++) {
                    const colNum = i + 3;
                    html += `<td>
                        <input type="text" 
                               class="edit-input" 
                               data-row="${rowNum}" 
                               data-col="${colNum}" 
                               value="${formatNumber(item.bulan[i])}"
                               oninput="onInputChange(this)">
                    </td>`;
                }
                
                // Action
                html += `<td>
                    <button class="btn-save" onclick="saveRow(${index})">
                        💾 Save
                    </button>
                </td>`;
                
                html += `</tr>`;
            });
            
            tbody.innerHTML = html;
            changes = {};
            
            debug(`✅ Table rendered: ${rawData.length} rows`);
        }

        // ============================================================
        // INPUT CHANGE
        // ============================================================
        
        function onInputChange(input) {
            const row = input.dataset.row;
            const col = input.dataset.col;
            const key = `${row}-${col}`;
            const newValue = parseNumber(input.value);
            
            const rowIndex = parseInt(row) - 2;
            const colIndex = parseInt(col) - 2;
            
            let originalValue;
            if (colIndex === 0) {
                originalValue = rawData[rowIndex].target;
            } else {
                originalValue = rawData[rowIndex].bulan[colIndex - 1];
            }
            
            if (newValue !== originalValue) {
                changes[key] = newValue;
                input.classList.add('changed');
            } else {
                delete changes[key];
                input.classList.remove('changed');
            }
        }

        // ============================================================
        // SAVE ROW - KIRIM KE GOOGLE APPS SCRIPT
        // ============================================================
        
        async function saveRow(rowIndex) {
            const rowNum = rowIndex + 2;
            
            // Collect changes
            const rowChanges = {};
            
            for (let col = 2; col <= 14; col++) {
                const key = `${rowNum}-${col}`;
                if (changes[key] !== undefined) {
                    rowChanges[col] = changes[key];
                }
            }
            
            if (Object.keys(rowChanges).length === 0) {
                showToast('⚠️ Tidak ada perubahan!', 'error');
                return;
            }
            
            // Find and disable button
            const btn = document.querySelector(`tr[data-row="${rowNum}"] .btn-save`);
            btn.disabled = true;
            btn.classList.add('saving');
            btn.textContent = '⏳ Menyimpan...';
            
            showLoading(true, `Menyimpan ${Object.keys(rowChanges).length} data...`);
            debug(`💾 Saving row ${rowIndex} (row ${rowNum})`);
            
            let successCount = 0;
            
            try {
                // Save each cell
                for (const [colStr, value] of Object.entries(rowChanges)) {
                    const col = parseInt(colStr);
                    
                    debug(`📤 POST: sheetIndex=${currentSheetIndex}, row=${rowNum}, col=${col}, value=${value}`);
                    
                    const response = await fetch(WEB_APP_URL, {
                        method: 'POST',
                        mode: 'no-cors',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            sheetIndex: currentSheetIndex,
                            row: rowNum,
                            column: col,
                            value: value
                        })
                    });
                    
                    successCount++;
                    debug(`✅ Saved: Col ${col} = ${value}`);
                    
                    // Small delay
                    await new Promise(r => setTimeout(r, 100));
                }
                
                // Update local data
                for (const [colStr, value] of Object.entries(rowChanges)) {
                    const col = parseInt(colStr);
                    
                    if (col === 2) {
                        rawData[rowIndex].target = value;
                    } else {
                        rawData[rowIndex].bulan[col - 3] = value;
                    }
                }
                
                // Clear changes
                for (const colStr of Object.keys(rowChanges)) {
                    delete changes[`${rowNum}-${colStr}`];
                }
                
                renderTable();
                
                showToast(`✅ ${successCount} data berhasil disimpan!`, 'success');
                debug(`✅ Save complete: ${successCount} cells`);
                
            } catch (error) {
                console.error('Error:', error);
                debug(`❌ Error: ${error.message}`);
                showToast('Gagal menyimpan: ' + error.message, 'error');
            }
            
            showLoading(false);
        }

        // ============================================================
        // SWITCH SHEET
        // ============================================================
        
        function switchSheet(index, name) {
            currentSheetIndex = index;
            currentSheetName = name;
            
            document.querySelectorAll('.sheet-tab').forEach(tab => {
                tab.classList.remove('active');
            });
            event.target.classList.add('active');
            
            document.getElementById('currentSheetName').textContent = name;
            
            loadData();
        }

        // ============================================================
        // TOAST
        // ============================================================
        
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            const toastIcon = document.getElementById('toastIcon');
            const toastMessage = document.getElementById('toastMessage');
            
            toastIcon.textContent = type === 'success' ? '✅' : '❌';
            toastMessage.textContent = message;
            toast.className = `toast ${type} show`;
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 4000);
        }

        // ============================================================
        // LOADING
        // ============================================================
        
        function showLoading(show, text = 'Memproses...') {
            document.getElementById('loading').classList.toggle('show', show);
            document.getElementById('loadingText').textContent = text;
        }

        // ============================================================
        // INIT
        // ============================================================
        
        document.getElementById('statusAlert').className = 'alert alert-success';
        document.getElementById('statusAlert').innerHTML = '✅ <strong>API Ready!</strong> Web App URL sudah dikonfigurasi.';
        
        // Auto load on page ready
        document.addEventListener('DOMContentLoaded', () => {
            debug('🚀 Page loaded, auto loading data...');
            loadData();
        });
    </script>
</body>
</html>
