<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Edit Data Pajak BAPENDA Lombok Tengah</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
        }

        .header {
            background: linear-gradient(135deg, #e53e3e 0%, #c53030 100%);
            color: white;
            padding: 15px 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn-back {
            background: rgba(255,255,255,0.2);
            color: white;
            padding: 8px 15px;
            border: none;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
        }

        .btn-back:hover { background: rgba(255,255,255,0.3); color: white; }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        .alert {
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .alert-success { background: #d4edda; border: 1px solid #28a745; color: #155724; }
        .alert-danger { background: #f8d7da; border: 1px solid #dc3545; color: #721c24; }
        .alert-info { background: #d1ecf1; border: 1px solid #17a2b8; color: #0c5460; }

        .card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #e2e8f0;
            flex-wrap: wrap;
            gap: 15px;
        }

        .card-title { font-size: 1.1rem; font-weight: 600; }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-primary { background: #3182ce; color: white; }
        .btn-primary:hover { background: #2c5282; }
        .btn-success { background: #48bb78; color: white; }
        .btn-success:hover { background: #38a169; }

        .sheet-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .sheet-tab {
            padding: 10px 25px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }

        .sheet-tab.active { background: #3182ce; color: white; }
        .sheet-tab:not(.active) { background: #e2e8f0; color: #4a5568; }

        .table-responsive { overflow-x: auto; }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.8rem;
        }

        th {
            background: #1a202c;
            color: white;
            padding: 10px 5px;
            text-align: center;
            white-space: nowrap;
        }

        th:first-child, td:first-child { text-align: center; width: 30px; }
        th:nth-child(2), td:nth-child(2) { text-align: left; min-width: 180px; }

        td {
            padding: 6px 3px;
            border-bottom: 1px solid #e2e8f0;
            text-align: center;
        }

        tr:hover { background: #f7fafc; }

        .edit-input {
            width: 100%;
            max-width: 85px;
            padding: 5px 5px;
            border: 1px solid #e2e8f0;
            border-radius: 5px;
            text-align: right;
            font-family: 'Courier New', monospace;
            font-size: 0.75rem;
        }

        .edit-input:focus {
            outline: none;
            border-color: #3182ce;
            box-shadow: 0 0 0 2px rgba(49,130,206,0.2);
        }

        .edit-input.changed {
            background: #fef3c7;
            border-color: #f59e0b;
            font-weight: 600;
        }

        .btn-save {
            background: #48bb78;
            color: white;
            border: none;
            padding: 5px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .btn-save:hover { background: #38a169; }
        .btn-save:disabled { background: #a0aec0; cursor: not-allowed; }
        .btn-save.saving { background: #d69e2e; }

        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 10px;
            color: white;
            font-weight: 500;
            z-index: 1000;
            animation: slideIn 0.3s ease;
            display: none;
        }

        .toast.show { display: flex; align-items: center; gap: 10px; }
        .toast.success { background: #48bb78; }
        .toast.error { background: #e53e3e; }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(100px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 999;
        }

        .loading.show { display: flex; }

        .loading-box {
            background: white;
            padding: 30px 50px;
            border-radius: 15px;
            text-align: center;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #e2e8f0;
            border-top: 4px solid #3182ce;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 768px) {
            .header-content { flex-direction: column; gap: 10px; }
            .edit-input { width: 70px; font-size: 0.7rem; }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-content">
            <h1>⚙️ Admin Panel - Edit Data Pajak BAPENDA Lombok Tengah</h1>
            <a href="dashboard.html" class="btn-back">← Dashboard</a>
        </div>
    </header>

    <div class="container">
        <!-- Status Alert -->
        <div id="statusAlert" class="alert alert-info">
            🔄 Memuat data...
        </div>

        <!-- Main Card -->
        <div class="card">
            <div class="card-header">
                <h2 class="card-title">📝 Edit Data Pajak - <span id="currentSheetName">Loading...</span></h2>
                <div>
                    <button class="btn btn-primary" onclick="loadData()">
                        🔄 Load Ulang
                    </button>
                </div>
            </div>

            <!-- Sheet Tabs -->
            <div class="sheet-tabs">
                <button class="sheet-tab active" onclick="switchSheet(0, 'Data_Pajak_2026')">
                    📅 Data_Pajak_2026
                </button>
                <button class="sheet-tab" onclick="switchSheet(1, 'Data_Pajak_2025')">
                    📅 Data_Pajak_2025
                </button>
            </div>

            <!-- Table -->
            <div class="table-responsive">
                <table>
                    <thead id="tableHead">
                        <tr>
                            <th>Loading...</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <tr>
                            <td colspan="16" style="text-align: center; padding: 40px; color: #999;">
                                Memuat data...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast">
        <span id="toastIcon">✅</span>
        <span id="toastMessage">Berhasil!</span>
    </div>

    <!-- Loading -->
    <div class="loading" id="loading">
        <div class="loading-box">
            <div class="spinner"></div>
            <p id="loadingText">Memproses...</p>
        </div>
    </div>

    <script>
        // ============================================================
        // KONFIGURASI - URL BARU!
        // ============================================================
        
        const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbyHLEPqaP0BKWuiLoYiTBvtYlq2HWWUJz0yNpAKTNucP1BiwBFsDZa2-qbcgz4u253u/exec';

        // ============================================================
        // STATUS
        // ============================================================
        
        let currentSheetIndex = 0;
        let currentSheetName = 'Data_Pajak_2026';
        let rawData = [];
        let headers = [];
        let changes = {};

        // ============================================================
        // FORMAT
        // ============================================================
        
        function formatNumber(num) {
            if (!num && num !== 0) return '0';
            return parseFloat(num).toLocaleString('id-ID');
        }

        function parseNumber(str) {
            if (!str) return 0;
            const cleaned = str.toString().replace(/[^\d.-]/g, '');
            return parseFloat(cleaned) || 0;
        }

        // ============================================================
        // LOAD DATA DARI APPS SCRIPT
        // ============================================================
        
        async function loadData() {
            showLoading(true, 'Memuat data dari server...');
            
            try {
                const url = `${WEB_APP_URL}?action=getData&sheetIndex=${currentSheetIndex}`;
                
                const response = await fetch(url);
                
                if (!response.ok) {
                    throw new Error(`HTTP Error: ${response.status}`);
                }
                
                const result = await response.json();
                
                if (result.status !== 'success') {
                    throw new Error(result.message || 'Gagal mengambil data');
                }
                
                // Parse data
                const data = result.data;
                currentSheetName = result.sheetName;
                
                // Set headers (baris pertama)
                headers = data[0] || [];
                
                // Set raw data (mulai baris 2)
                rawData = [];
                for (let i = 1; i < data.length; i++) {
                    if (data[i] && data[i][0]) { // Skip baris kosong
                        rawData.push(data[i]);
                    }
                }
                
                renderTable();
                showToast(`✅ Data berhasil dimuat! (${rawData.length} pajak)`, 'success');
                
                document.getElementById('statusAlert').className = 'alert alert-success';
                document.getElementById('statusAlert').innerHTML = `✅ <strong>Connected!</strong> Sheet: <strong>${currentSheetName}</strong> | ${rawData.length} data`;
                
            } catch (error) {
                console.error('Error:', error);
                showToast('Error: ' + error.message, 'error');
                
                document.getElementById('statusAlert').className = 'alert alert-danger';
                document.getElementById('statusAlert').innerHTML = `❌ <strong>Error:</strong> ${error.message}`;
            }
            
            showLoading(false);
        }

        // ============================================================
        // RENDER TABLE
        // ============================================================
        
        function renderTable() {
            const thead = document.getElementById('tableHead');
            const tbody = document.getElementById('tableBody');
            const sheetNameEl = document.getElementById('currentSheetName');
            
            sheetNameEl.textContent = currentSheetName;
            
            if (rawData.length === 0) {
                thead.innerHTML = '<tr><th>No</th><th>Data</th></tr>';
                tbody.innerHTML = '<tr><td colspan="2" style="text-align: center; padding: 30px; color: #999;">Tidak ada data</td></tr>';
                return;
            }
            
            // Render header - tampilkan 14 kolom (Target + 12 Bulan)
            let headerHtml = '<tr><th>#</th><th>Jenis Pajak</th>';
            const displayHeaders = ['Target', 'Januari', 'Februari', 'Maret', 'April', 'Mei', 'Juni', 'Juli', 'Agustus', 'September', 'Oktober', 'November', 'Desember'];
            displayHeaders.forEach(h => {
                headerHtml += `<th>${h}</th>`;
            });
            headerHtml += '<th>Aksi</th></tr>';
            thead.innerHTML = headerHtml;
            
            // Render body
            let bodyHtml = '';
            
            rawData.forEach((row, index) => {
                const rowNum = index + 2; // Row 2 karena header di row 1
                
                bodyHtml += `<tr>`;
                bodyHtml += `<td><strong>${index + 1}</strong></td>`;
                
                // Kolom pertama = nama/jenis pajak
                bodyHtml += `<td style="text-align: left; font-weight: 500;">${row[0] || ''}</td>`;
                
                // Kolom 1 = Target, Kolom 2-13 = 12 Bulan
                // Row array: [0]=Nama, [1]=Target, [2]=Jan, [3]=Feb, ... [13]=Des
                for (let col = 1; col <= 13; col++) {
                    const colNum = col + 1; // Column number (1-indexed, A=1)
                    const value = row[col] || 0;
                    
                    bodyHtml += `<td>
                        <input type="text" 
                               class="edit-input" 
                               data-row="${rowNum}" 
                               data-col="${colNum}" 
                               value="${formatNumber(value)}"
                               oninput="onInputChange(this)">
                    </td>`;
                }
                
                // Action
                bodyHtml += `<td>
                    <button class="btn-save" onclick="saveRow(${index})">
                        💾 Save
                    </button>
                </td>`;
                
                bodyHtml += `</tr>`;
            });
            
            tbody.innerHTML = bodyHtml;
            changes = {};
        }

        // ============================================================
        // INPUT CHANGE
        // ============================================================
        
        function onInputChange(input) {
            const row = input.dataset.row;
            const col = input.dataset.col;
            const key = `${row}-${col}`;
            const newValue = parseNumber(input.value);
            
            // Find original value
            const rowIndex = parseInt(row) - 2;
            const colIndex = parseInt(col) - 1; // 0-indexed
            
            const originalValue = rawData[rowIndex] ? (parseFloat(rawData[rowIndex][colIndex]) || 0) : 0;
            
            if (Math.abs(newValue - originalValue) > 0.01) {
                changes[key] = newValue;
                input.classList.add('changed');
            } else {
                delete changes[key];
                input.classList.remove('changed');
            }
        }

        // ============================================================
        // SAVE ROW
        // ============================================================
        
        async function saveRow(rowIndex) {
            const rowNum = rowIndex + 2;
            
            // Collect changes
            const rowChanges = {};
            
            for (let col = 1; col <= 14; col++) {
                const key = `${rowNum}-${col}`;
                if (changes[key] !== undefined) {
                    rowChanges[col] = changes[key];
                }
            }
            
            if (Object.keys(rowChanges).length === 0) {
                showToast('⚠️ Tidak ada perubahan!', 'error');
                return;
            }
            
            // Find and disable button
            const btn = event.target;
            btn.disabled = true;
            btn.classList.add('saving');
            btn.textContent = '⏳...';
            
            showLoading(true, `Menyimpan ${Object.keys(rowChanges).length} data...`);
            
            let successCount = 0;
            
            try {
                // Save each cell
                for (const [colStr, value] of Object.entries(rowChanges)) {
                    const col = parseInt(colStr);
                    
                    await fetch(WEB_APP_URL, {
                        method: 'POST',
                        mode: 'no-cors',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            sheetIndex: currentSheetIndex,
                            row: rowNum,
                            column: col,
                            value: value
                        })
                    });
                    
                    successCount++;
                    console.log(`✅ Saved: Row ${rowNum}, Col ${col} = ${value}`);
                    
                    await new Promise(r => setTimeout(r, 100));
                }
                
                // Update local data
                for (const [colStr, value] of Object.entries(rowChanges)) {
                    const col = parseInt(colStr);
                    const colIndex = col - 1;
                    
                    if (rawData[rowIndex]) {
                        rawData[rowIndex][colIndex] = value;
                    }
                }
                
                // Clear changes
                for (const colStr of Object.keys(rowChanges)) {
                    delete changes[`${rowNum}-${colStr}`];
                }
                
                renderTable();
                
                showToast(`✅ ${successCount} data berhasil disimpan!`, 'success');
                
            } catch (error) {
                console.error('Error:', error);
                showToast('Gagal menyimpan: ' + error.message, 'error');
            }
            
            showLoading(false);
        }

        // ============================================================
        // SWITCH SHEET
        // ============================================================
        
        function switchSheet(index, name) {
            currentSheetIndex = index;
            currentSheetName = name;
            
            document.querySelectorAll('.sheet-tab').forEach(tab => {
                tab.classList.remove('active');
            });
            event.target.classList.add('active');
            
            loadData();
        }

        // ============================================================
        // TOAST
        // ============================================================
        
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            const toastIcon = document.getElementById('toastIcon');
            const toastMessage = document.getElementById('toastMessage');
            
            toastIcon.textContent = type === 'success' ? '✅' : '❌';
            toastMessage.textContent = message;
            toast.className = `toast ${type} show`;
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 4000);
        }

        // ============================================================
        // LOADING
        // ============================================================
        
        function showLoading(show, text = 'Memproses...') {
            document.getElementById('loading').classList.toggle('show', show);
            document.getElementById('loadingText').textContent = text;
        }

        // ============================================================
        // INIT
        // ============================================================
        
        document.addEventListener('DOMContentLoaded', () => {
            loadData();
        });
    </script>
</body>
</html>
