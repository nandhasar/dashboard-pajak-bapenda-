<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Edit Data Pajak BAPENDA Lombok Tengah</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
        }

        .header {
            background: linear-gradient(135deg, #e53e3e 0%, #c53030 100%);
            color: white;
            padding: 15px 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn-back {
            background: rgba(255,255,255,0.2);
            color: white;
            padding: 8px 15px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-back:hover {
            background: rgba(255,255,255,0.3);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #e2e8f0;
        }

        .card-title {
            font-size: 1.2rem;
            font-weight: 600;
            color: #1a202c;
        }

        .year-tabs {
            display: flex;
            gap: 10px;
        }

        .year-tab {
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .year-tab.active {
            background: #3182ce;
            color: white;
        }

        .year-tab:not(.active) {
            background: #e2e8f0;
            color: #4a5568;
        }

        .table-responsive {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 900px;
        }

        th {
            background: #1a202c;
            color: white;
            padding: 12px 10px;
            text-align: left;
            font-size: 0.8rem;
            white-space: nowrap;
        }

        td {
            padding: 10px;
            border-bottom: 1px solid #e2e8f0;
            font-size: 0.85rem;
        }

        tr:hover {
            background: #f7fafc;
        }

        .input-group {
            display: flex;
            gap: 5px;
            align-items: center;
        }

        .input-month {
            width: 80px;
            padding: 8px;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            font-size: 0.8rem;
            text-align: right;
            font-family: 'Courier New', monospace;
        }

        .input-month:focus {
            outline: none;
            border-color: #3182ce;
            box-shadow: 0 0 0 3px rgba(49,130,206,0.2);
        }

        .input-target {
            width: 120px;
            padding: 8px;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            font-size: 0.85rem;
            text-align: right;
            font-family: 'Courier New', monospace;
        }

        .btn-save {
            background: linear-gradient(135deg, #48bb78 0%, #38a169 100%);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-save:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(72,187,120,0.4);
        }

        .btn-save:disabled {
            background: #a0aec0;
            cursor: not-allowed;
            transform: none;
        }

        .btn-save.saving {
            background: #d69e2e;
        }

        .status-bar {
            background: #48bb78;
            color: white;
            padding: 15px 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
            align-items: center;
            gap: 10px;
            animation: slideIn 0.3s ease;
        }

        .status-bar.error {
            background: #e53e3e;
        }

        .status-bar.show {
            display: flex;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .footer {
            text-align: center;
            padding: 20px;
            color: #718096;
            font-size: 0.8rem;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header-content {
                flex-direction: column;
                gap: 10px;
            }
            
            .year-tabs {
                width: 100%;
            }
            
            .year-tab {
                flex: 1;
                padding: 8px 10px;
                font-size: 0.8rem;
            }
            
            .card-header {
                flex-direction: column;
                gap: 15px;
            }
            
            .input-month {
                width: 65px;
                font-size: 0.7rem;
            }
            
            .input-target {
                width: 100px;
            }
        }

        /* Loading */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .loading-overlay.show {
            display: flex;
        }

        .loading-box {
            background: white;
            padding: 30px 50px;
            border-radius: 15px;
            text-align: center;
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #e2e8f0;
            border-top: 4px solid #3182ce;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-content">
            <h1>⚙️ Admin Panel - Edit Data Pajak</h1>
            <a href="dashboard.html" class="btn-back">← Kembali ke Dashboard</a>
        </div>
    </header>

    <div class="container">
        <!-- Status Bar -->
        <div id="statusBar" class="status-bar">
            <span id="statusIcon">✅</span>
            <span id="statusText">Data berhasil disimpan!</span>
        </div>

        <!-- Main Card -->
        <div class="card">
            <div class="card-header">
                <h2 class="card-title">📝 Edit Data Realisasi Pajak</h2>
                <div class="year-tabs">
                    <button class="year-tab active" onclick="switchYear(2026)">📅 2026</button>
                    <button class="year-tab" onclick="switchYear(2025)">📅 2025</button>
                </div>
            </div>
            
            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th>No</th>
                            <th>Jenis Pajak</th>
                            <th>Target</th>
                            <th>Jan</th>
                            <th>Feb</th>
                            <th>Mar</th>
                            <th>Apr</th>
                            <th>Mei</th>
                            <th>Jun</th>
                            <th>Jul</th>
                            <th>Agu</th>
                            <th>Sep</th>
                            <th>Okt</th>
                            <th>Nov</th>
                            <th>Des</th>
                            <th>Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <!-- Will be populated by JavaScript -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="loading-overlay">
        <div class="loading-box">
            <div class="loading-spinner"></div>
            <p>Menyimpan data...</p>
        </div>
    </div>

    <footer class="footer">
        <p>⚙️ Admin Panel BAPENDA Lombok Tengah | © 2026</p>
    </footer>

    <script>
        // ==================== KONFIGURASI ====================
        
        // ⚠️ GANTI DENGAN URL GOOGLE APPS SCRIPT ANDA!
        const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbzlyr3jVV26UxTWgSHRc2z4Vo7VRGATiunSWuCqYMs-WmDVDXqPdGwEB7iaSfBJrb1Q/exec';
        
        const SHEET_ID = '1BE7gPYSSlCnaIZ4Q7RvGx_L_2v46fQjkEnK3EC3VQz4';
        const GID_2026 = '0';
        const GID_2025 = '757965445';

        let currentYear = 2026;
        let data2026 = [];
        let data2025 = [];
        let originalData = {};

        const monthNames = ['Jan', 'Feb', 'Mar', 'Apr', 'Mei', 'Jun', 'Jul', 'Agu', 'Sep', 'Okt', 'Nov', 'Des'];

        // ==================== FORMAT ====================
        function formatRupiah(num) {
            return num.toLocaleString('id-ID');
        }

        function parseNumber(str) {
            if (!str) return 0;
            const cleaned = str.toString().replace(/[^\d.-]/g, '');
            return parseFloat(cleaned) || 0;
        }

        // ==================== FETCH DATA ====================
        async function fetchSheetData(gid) {
            const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${gid}`;
            
            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error('Network error');
                const csv = await response.text();
                return parseCSV(csv);
            } catch (error) {
                console.error('Error:', error);
                showStatus('Gagal memuat data!', true);
                return [];
            }
        }

        function parseCSV(csv) {
            const lines = csv.split('\n');
            const result = [];
            
            for (let i = 1; i < lines.length; i++) {
                if (lines[i].trim() === '') continue;
                
                const values = [];
                let current = '';
                let inQuotes = false;
                
                for (let char of lines[i]) {
                    if (char === '"') {
                        inQuotes = !inQuotes;
                    } else if (char === ',' && !inQuotes) {
                        values.push(current.trim());
                        current = '';
                    } else {
                        current += char;
                    }
                }
                values.push(current.trim());
                
                if (!values[0] || values[0].trim() === '') continue;
                
                const row = {
                    name: values[0].trim(),
                    target: parseFloat(values[1]) || 0,
                    bulan: []
                };
                
                for (let j = 2; j <= 13; j++) {
                    row.bulan.push(parseFloat(values[j]) || 0);
                }
                
                result.push(row);
            }
            
            return result;
        }

        // ==================== LOAD DATA ====================
        async function loadData() {
            [data2026, data2025] = await Promise.all([
                fetchSheetData(GID_2026),
                fetchSheetData(GID_2025)
            ]);
            
            // Simpan data original untuk reset
            originalData = {
                2026: JSON.parse(JSON.stringify(data2026)),
                2025: JSON.parse(JSON.stringify(data2025))
            };
            
            renderTable();
        }

        // ==================== RENDER TABLE ====================
        function renderTable() {
            const data = currentYear === 2026 ? data2026 : data2025;
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';
            
            data.forEach((item, index) => {
                const rowNum = index + 2; // Row 2 karena header di row 1
                
                let row = `<tr>`;
                row += `<td>${index + 1}</td>`;
                row += `<td style="font-weight: 600; max-width: 150px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">${item.name}</td>`;
                row += `<td><input type="text" class="input-target" value="${formatRupiah(item.target)}" data-row="${rowNum}" data-field="target"></td>`;
                
                for (let i = 0; i < 12; i++) {
                    const value = item.bulan[i] || 0;
                    row += `<td><input type="text" class="input-month" value="${formatRupiah(value)}" data-row="${rowNum}" data-month="${i}"></td>`;
                }
                
                row += `<td><button class="btn-save" onclick="saveRow(${index})">💾 Simpan</button></td>`;
                row += `</tr>`;
                
                tbody.innerHTML += row;
            });

            // Add event listeners
            document.querySelectorAll('.input-target, .input-month').forEach(input => {
                input.addEventListener('input', function(e) {
                    // Allow only numbers and common separators
                    this.value = this.value.replace(/[^\d.]/g, '');
                });
            });
        }

        // ==================== SAVE SINGLE ROW ====================
        async function saveRow(index) {
            const data = currentYear === 2026 ? data2026 : data2025;
            const item = data[index];
            const rowNum = index + 2;
            
            // Show loading
            document.getElementById('loadingOverlay').classList.add('show');
            
            // Ambil nilai dari input
            const targetInput = document.querySelector(`input[data-row="${rowNum}"][data-field="target"]`);
            const newTarget = parseNumber(targetInput.value);
            
            const bulan = [];
            for (let i = 0; i < 12; i++) {
                const input = document.querySelector(`input[data-row="${rowNum}"][data-month="${i}"]`);
                bulan.push(parseNumber(input.value));
            }
            
            const saveData = {
                year: currentYear.toString(),
                row: rowNum,
                data: {
                    target: newTarget,
                    bulan: bulan
                }
            };
            
            try {
                // Kirim ke Google Apps Script
                const response = await fetch(WEB_APP_URL, {
                    method: 'POST',
                    mode: 'no-cors', // Penting untuk Google Apps Script
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(saveData)
                });
                
                // Update local data
                item.target = newTarget;
                item.bulan = bulan;
                
                // Update original data
                originalData[currentYear][index] = JSON.parse(JSON.stringify(item));
                
                showStatus('✅ Data berhasil disimpan ke spreadsheet!');
                
                // Refresh data
                setTimeout(() => {
                    loadData();
                }, 1000);
                
            } catch (error) {
                console.error('Error saving:', error);
                showStatus('❌ Gagal menyimpan data: ' + error.message, true);
            } finally {
                document.getElementById('loadingOverlay').classList.remove('show');
            }
        }

        // ==================== SWITCH YEAR ====================
        function switchYear(year) {
            currentYear = year;
            
            // Update tabs
            document.querySelectorAll('.year-tab').forEach(tab => {
                tab.classList.remove('active');
            });
            event.target.classList.add('active');
            
            // Render table
            renderTable();
        }

        // ==================== STATUS ====================
        function showStatus(message, isError = false) {
            const statusBar = document.getElementById('statusBar');
            const statusText = document.getElementById('statusText');
            const statusIcon = document.getElementById('statusIcon');
            
            statusText.textContent = message;
            statusIcon.textContent = isError ? '❌' : '✅';
            statusBar.className = 'status-bar show' + (isError ? ' error' : '');
            
            setTimeout(() => {
                statusBar.classList.remove('show');
            }, 4000);
        }

        // ==================== INIT ====================
        document.addEventListener('DOMContentLoaded', loadData);
    </script>
</body>
</html>
